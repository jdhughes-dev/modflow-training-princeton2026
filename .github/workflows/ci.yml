name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      - name: Install flopy4
        run: pixi run install-flopy4

      - name: Check environment
        run: pixi run python -c "import flopy, flopy4, modflow_devtools, numpy, matplotlib, geopandas, rasterio, pyvista"
